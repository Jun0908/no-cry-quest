    <radialGradient id="halo" cx="50%" cy="50%" r="45%">
      <stop offset="0%" stop-color="var(--final-glow)" stop-opacity="0.38" />
      <stop offset="100%" stop-color="var(--final-glow)" stop-opacity="0" />
