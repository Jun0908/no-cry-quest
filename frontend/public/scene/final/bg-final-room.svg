    <path d="M400 900V560L800 340L1200 560V900" />
  </g>
  <g fill="#d9f2ff" fill-opacity="0.3">
    <circle cx="220" cy="180" r="4" />
    <circle cx="360" cy="90" r="3" />
    <circle cx="1340" cy="140" r="4" />
    <circle cx="1220" cy="240" r="2.5" />
    <circle cx="980" cy="80" r="3" />
  </g>
