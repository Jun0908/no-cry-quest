<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" fill="none">
  <style>
    :root {
      --final-bg-0: #08111f;
      --final-bg-1: #11233a;
      --final-bg-2: #223a52;
      --final-line: #7da6cc;
      --final-glow: #6ee7ff;
    }
  </style>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="var(--final-bg-0)" />
      <stop offset="55%" stop-color="var(--final-bg-1)" />
      <stop offset="100%" stop-color="var(--final-bg-2)" />
