<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- Background circle -->
  <circle cx="50" cy="50" r="50" fill="#0d0d1f"/>

  <g fill="#c9962a">
    <!-- Base leaves (葉) -->
    <path d="M50 80 C44 76 29 67 27 54 C36 62 44 66 50 69 C56 66 64 62 73 54 C71 67 56 76 50 80Z"/>

    <!-- Stems (茎) -->
    <rect x="48.5" y="45" width="3" height="26" rx="1.5"/>
    <path d="M49 58 Q41 53 33 43" stroke="#c9962a" stroke-width="2.5" fill="none" stroke-linecap="round"/>
    <path d="M51 58 Q59 53 67 43" stroke="#c9962a" stroke-width="2.5" fill="none" stroke-linecap="round"/>

    <!-- Center cluster: 7 buds (1+2+2+2) -->
    <ellipse cx="50"   cy="16" rx="3.5" ry="5.5"/>
    <ellipse cx="43.5" cy="23" rx="3"   ry="4.5"/>
    <ellipse cx="56.5" cy="23" rx="3"   ry="4.5"/>
    <ellipse cx="43.5" cy="30" rx="2.5" ry="4"/>
    <ellipse cx="56.5" cy="30" rx="2.5" ry="4"/>
    <ellipse cx="43.5" cy="37" rx="2.5" ry="3.5"/>
    <ellipse cx="56.5" cy="37" rx="2.5" ry="3.5"/>

    <!-- Left cluster: 5 buds (1+2+2) -->
    <ellipse cx="33"   cy="30" rx="3"   ry="4.5" transform="rotate(-25 33 30)"/>
    <ellipse cx="26"   cy="36" rx="2.5" ry="4"   transform="rotate(-25 26 36)"/>
    <ellipse cx="39.5" cy="36" rx="2.5" ry="4"   transform="rotate(-5  39.5 36)"/>
    <ellipse cx="26"   cy="42" rx="2"   ry="3.5" transform="rotate(-20 26 42)"/>
    <ellipse cx="39.5" cy="42" rx="2"   ry="3.5" transform="rotate(0   39.5 42)"/>

    <!-- Right cluster: 5 buds (1+2+2) -->
    <ellipse cx="67"   cy="30" rx="3"   ry="4.5" transform="rotate(25  67 30)"/>
    <ellipse cx="60.5" cy="36" rx="2.5" ry="4"   transform="rotate(5   60.5 36)"/>
    <ellipse cx="74"   cy="36" rx="2.5" ry="4"   transform="rotate(25  74 36)"/>
    <ellipse cx="60.5" cy="42" rx="2"   ry="3.5" transform="rotate(0   60.5 42)"/>
    <ellipse cx="74"   cy="42" rx="2"   ry="3.5" transform="rotate(20  74 42)"/>
  </g>
</svg>
