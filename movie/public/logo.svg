<svg xmlns="http://www.w3.org/2000/svg" width="200" height="200" viewBox="0 0 200 200">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f0f1a"/>
      <stop offset="100%" style="stop-color:#1a1a3e"/>
    </linearGradient>
    <linearGradient id="playGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#2B4FFF"/>
      <stop offset="100%" style="stop-color:#7B61FF"/>
    </linearGradient>
    <linearGradient id="waveGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#FF6B35"/>
      <stop offset="100%" style="stop-color:#FF3366"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2.5" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="200" height="200" rx="32" fill="url(#bg)"/>

  <!-- Film strip top -->
  <rect x="20" y="18" width="160" height="10" rx="2" fill="#1e1e3a"/>
  <rect x="28" y="20" width="12" height="6" rx="1" fill="#2B4FFF" opacity="0.6"/>
  <rect x="48" y="20" width="12" height="6" rx="1" fill="#2B4FFF" opacity="0.6"/>
  <rect x="68" y="20" width="12" height="6" rx="1" fill="#2B4FFF" opacity="0.6"/>
  <rect x="88" y="20" width="12" height="6" rx="1" fill="#2B4FFF" opacity="0.6"/>
  <rect x="108" y="20" width="12" height="6" rx="1" fill="#2B4FFF" opacity="0.6"/>
  <rect x="128" y="20" width="12" height="6" rx="1" fill="#2B4FFF" opacity="0.6"/>
  <rect x="148" y="20" width="12" height="6" rx="1" fill="#2B4FFF" opacity="0.6"/>

  <!-- Film strip bottom -->
  <rect x="20" y="172" width="160" height="10" rx="2" fill="#1e1e3a"/>
  <rect x="28" y="174" width="12" height="6" rx="1" fill="#2B4FFF" opacity="0.6"/>
  <rect x="48" y="174" width="12" height="6" rx="1" fill="#2B4FFF" opacity="0.6"/>
  <rect x="68" y="174" width="12" height="6" rx="1" fill="#2B4FFF" opacity="0.6"/>
  <rect x="88" y="174" width="12" height="6" rx="1" fill="#2B4FFF" opacity="0.6"/>
  <rect x="108" y="174" width="12" height="6" rx="1" fill="#2B4FFF" opacity="0.6"/>
  <rect x="128" y="174" width="12" height="6" rx="1" fill="#2B4FFF" opacity="0.6"/>
  <rect x="148" y="174" width="12" height="6" rx="1" fill="#2B4FFF" opacity="0.6"/>

  <!-- Play button circle -->
  <circle cx="100" cy="90" r="36" fill="url(#playGrad)" filter="url(#glow)" opacity="0.95"/>
  <polygon points="90,76 90,104 118,90" fill="white"/>

  <!-- Audio waveform bars -->
  <rect x="44" y="142" width="8" height="16" rx="4" fill="url(#waveGrad)" opacity="0.9"/>
  <rect x="58" y="134" width="8" height="24" rx="4" fill="url(#waveGrad)" opacity="0.9"/>
  <rect x="72" y="126" width="8" height="32" rx="4" fill="url(#waveGrad)"/>
  <rect x="86" y="132" width="8" height="26" rx="4" fill="url(#waveGrad)" opacity="0.9"/>
  <rect x="100" y="122" width="8" height="36" rx="4" fill="url(#waveGrad)"/>
  <rect x="114" y="130" width="8" height="28" rx="4" fill="url(#waveGrad)" opacity="0.9"/>
  <rect x="128" y="126" width="8" height="32" rx="4" fill="url(#waveGrad)"/>
  <rect x="142" y="136" width="8" height="22" rx="4" fill="url(#waveGrad)" opacity="0.9"/>
  <rect x="156" y="144" width="8" height="14" rx="4" fill="url(#waveGrad)" opacity="0.8"/>
</svg>
